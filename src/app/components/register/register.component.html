<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <title>Page d'Inscription</title>
  <style>
    .btn-custom {
      background-color: #fd7e14; /* Couleur de fond */
      color: white; /* Couleur du texte */
      border: none; /* Pas de bordure */
      border-radius: 5px; /* Coins arrondis */
      padding: 10px 20px; /* Espacement intérieur */
      font-size: 16px; /* Taille de la police */
      width: 100%; /* Largeur complète */
      transition: background-color 0.3s; /* Effet de transition */
    }
    .btn-custom:hover {
      background-color: #e67e22; /* Couleur au survol */
    }
    .icon-color {
      color: #fd7e14; /* Couleur personnalisée pour les icônes */
    }
    .card {
      border: 2px solid #fd7e14; /* Ajout d'un cadre de couleur orange */
      border-radius: 10px; /* Coins arrondis pour le cadre */
    }
  </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow-lg" style="width: 400px;">
    <h2 class="text-center">Inscription</h2>
    <form>
      <div class="mb-3">
        <label class="form-label">Nom :</label>
        <input type="text" class="form-control" placeholder="Entrez votre nom" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Email :</label>
        <input type="email" class="form-control" placeholder="Entrez votre email" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Mot de passe :</label>
        <input type="password" class="form-control" placeholder="Créez un mot de passe" required>
      </div>

      <button type="submit" class="btn btn-custom mb-4">S'inscrire</button>
    </form>

    <div class="text-center mt-3">
      <button type="button" class="btn btn-link btn-floating mx-1">
        <i class="fab fa-facebook-f icon-color"></i>
      </button>
      <button type="button" class="btn btn-link btn-floating mx-1">
        <i class="fab fa-google icon-color"></i>
      </button>
      <button type="button" class="btn btn-link btn-floating mx-1">
        <i class="fab fa-twitter icon-color"></i>
      </button>
      <button type="button" class="btn btn-link btn-floating mx-1">
        <i class="fab fa-youtube icon-color"></i>
      </button>
    </div>

    <div class="text-center mt-3">
      <a href="/login">J'ai déjà un compte</a>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
