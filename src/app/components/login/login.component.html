<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <title>Page de Connexion</title>
  <style>
    .btn-custom {
      background-color: #fd7e14; /* Couleur de fond */
      color: white; /* Couleur du texte */
      border: none; /* Pas de bordure */
      border-radius: 5px; /* Coins arrondis */
      padding: 10px 20px; /* Espacement intérieur */
      font-size: 16px; /* Taille de la police */
      width: 100%; /* Largeur complète */
      transition: background-color 0.3s; /* Effet de transition */
    }
    .btn-custom:hover {
      background-color: #e67e22; /* Couleur au survol */
    }
    .icon-color {
      color: #fd7e14; /* Couleur personnalisée pour les icônes */
    }
    .card {
      border: 2px solid #fd7e14; /* Ajout d'un cadre de couleur orange */
      border-radius: 10px; /* Coins arrondis pour le cadre */
    }
  </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow-lg" style="width: 400px;">
    <h2 class="text-center">Connexion</h2>
    <form>
      <!-- Email input -->
      <div data-mdb-input-init class="form-outline mb-4">
        <input type="email" id="form2Example1" class="form-control" required />
        <label class="form-label" for="form2Example1">Adresse email</label>
      </div>

      <!-- Password input -->
      <div data-mdb-input-init class="form-outline mb-4">
        <input type="password" id="form2Example2" class="form-control" required />
        <label class="form-label" for="form2Example2">Mot de passe</label>
      </div>

      <!-- Checkbox and link -->
      <div class="row mb-4">
        <div class="col d-flex justify-content-center">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="form2Example31" checked />
            <label class="form-check-label" for="form2Example31"> Se souvenir de moi </label>
          </div>
        </div>
      </div>

      <!-- Submit button -->
      <button type="submit" class="btn btn-custom mb-4">Se connecter</button>

      <!-- Register buttons -->
      <div class="text-center">
        <p>Pas encore membre ? <a href="/register">S'inscrire</a></p>
        <button type="button" class="btn btn-link btn-floating mx-1">
          <i class="fab fa-facebook-f icon-color"></i>
        </button>
        <button type="button" class="btn btn-link btn-floating mx-1">
          <i class="fab fa-google icon-color"></i>
        </button>
        <button type="button" class="btn btn-link btn-floating mx-1">
          <i class="fab fa-twitter icon-color"></i>
        </button>
        <button type="button" class="btn btn-link btn-floating mx-1">
          <i class="fab fa-youtube icon-color"></i>
        </button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
